pkarr_put_rate_limit = "smart"

[limits]
max_dns_udp_requests = 1024
max_dns_tcp_connections = 256
max_http_connections = 512
max_http_requests = 1024
max_http2_streams_per_connection = 32
http_accept_rate_per_second = 200.0
http_accept_burst = 400
max_rate_limit_entries = 4096
trusted_proxy_cidrs = ["127.0.0.0/8", "::1/128"]
max_http_body_bytes = 65535
shutdown_timeout = "20s"

[https]
port = 443
domains = ["irohdns.example.org"]
cert_mode = "lets_encrypt"
letsencrypt_prod = true

[dns]
port = 53
default_soa = "dns1.irohdns.example.org hostmaster.irohdns.example.org 0 10800 3600 604800 3600"
default_ttl = 30
origins = ["irohdns.example.org", "."]
rr_a = "203.0.10.10"
rr_ns = "ns1.irohdns.example.org."

[mainline]
enabled = false
