name: Patchbay Tests

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: patchbay-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  SCCACHE_CACHE_SIZE: "10G"
  IROH_FORCE_STAGING_RELAYS: "1"
  NEXTEST_VERSION: "0.9.80"

jobs:
  patchbay_tests:
    name: Patchbay Tests
    timeout-minutes: 15
    runs-on: [self-hosted, linux, X64]
    env:
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        continue-on-error: true

      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
      - uses: ./.github/workflows/sccache-probe
      - name: Install cargo-make and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest@${{ env.NEXTEST_VERSION }},cargo-make

      - name: Build patchbay tests
        run: cargo make patchbay --no-run

      - name: Run patchbay tests
        run: |
          set -o pipefail
          cargo make patchbay 2>&1 | tee "$RUNNER_TEMP/logs.txt"
        env:
          IROH_PATCHBAY_PARITY_RECEIPT: ${{ runner.temp }}/patchbay-public-receipt.json
          PATCHBAY_LOG: ${{ runner.debug && 'trace' || 'debug' }}
          RUST_LOG: ${{ runner.debug && 'trace' || 'debug' }}

      - name: Validate Patchbay semantic fixture contract
        run: cargo test -p iroh-sim --test parity patchbay_fixture_import_is_strict_canonical_and_reports_capability_skips -- --exact

      - name: Import and compare fresh Patchbay semantic evidence
        run: |
          mkdir -p "$RUNNER_TEMP/parity"
          observed_at="$(date +%s)"
          cargo run -p iroh-sim --bin cargo-sim -- parity import-patchbay \
            "$RUNNER_TEMP/patchbay-public-receipt.json" \
            --source-revision "${{ github.sha }}" \
            --observed-at-unix-secs "$observed_at" \
            --output "$RUNNER_TEMP/parity/patchbay-public.json"
          cargo run -p iroh-sim --bin cargo-sim -- parity export public \
            --seed 7777777777777777777777777777777777777777777777777777777777777777 \
            --source-revision "${{ github.sha }}" \
            --observed-at-unix-secs "$observed_at" \
            --output "$RUNNER_TEMP/parity/deterministic-public.json"
          cargo run -p iroh-sim --bin cargo-sim -- parity compare \
            "$RUNNER_TEMP/parity/deterministic-public.json" \
            "$RUNNER_TEMP/parity/patchbay-public.json" \
            --output "$RUNNER_TEMP/parity/public-comparison.json"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: patchbay-testdir-${{ github.sha }}
          path: |
            target/testdir-current/
            ${{ runner.temp }}/logs.txt
            ${{ runner.temp }}/patchbay-public-receipt.json
            ${{ runner.temp }}/parity/
            iroh-sim/tests/fixtures/patchbay-public.json
          retention-days: 7
          if-no-files-found: ignore
